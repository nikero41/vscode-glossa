name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:oxc -- --format github

      - name: Type check
        run: npm run lint:ts

      - name: Build grammar
        run: npm run build:grammar

      - name: Build extension
        run: npm run build:extension

      - name: Test
        run: npm test
