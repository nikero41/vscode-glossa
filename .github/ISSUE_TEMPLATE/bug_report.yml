name: Bug Report
description: File a bug report to help us improve the ΓΛΩΣΣΑ VS Code extension
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open a .psg, .glo, or .gls file in VS Code...
        2. Run "Glossa: Run code" or "Glossa: Show flowchart"...
        3. See error...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: Instead...
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Which version of the extension are you using?
      placeholder: e.g., 0.0.1
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      description: Run `code --version` or check Help > About
      placeholder: e.g., 1.120.0
    validations:
      required: true

  - type: dropdown
    id: file-extension
    attributes:
      label: File Extension
      description: Which file extension is affected?
      options:
        - .psg
        - .glo
        - .gls
        - Not file-extension specific
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      placeholder: e.g., macOS 14.0, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      description: Please paste any relevant logs or error messages
      render: shell

  - type: textarea
    id: sample-code
    attributes:
      label: Sample ΓΛΩΣΣΑ Code
      description: If applicable, paste the smallest code sample that reproduces the issue
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here (screenshots, settings, etc.)
